<table class="table table-bordered table-striped text-center transaction-table">
    <thead>
        <tr>
            <th class="money-col">Type</th>
            <th>Date</th>
            <th>Description</th>
            <th class="money-col">Amount</th>
            <th class="action-col"><i class="bi bi-pencil-square"></i></th>
            <th class="action-col"><i class="bi bi-trash"></i></th>
        </tr>
    </thead>

    <tbody id="transactionsTable">
        {% for t in transactions %}
        <tr data-id="{{ t.id }}">
            <td>
                <select class="form-control" disabled>
                    <option value="income" {% if t.type == "income" %}selected{% endif %}>Income</option>
                    <option value="expense" {% if t.type == "expense" %}selected{% endif %}>Expense</option>
                </select>
            </td>
            <td>
                <input type="date" value="{{ t.date }}" class="form-control" disabled>
            </td>
            <td>
                <input type="text" value="{{ t.description }}" class="form-control" disabled>
            </td>
            <td>
                <input type="number" value="{{ t.amount }}" class="form-control" step="0.01" disabled>
            </td>
            <td>
                <button type="button" class="update-btn" onclick="editRow(this)">
                    <i class="bi bi-pencil-square"></i>
                </button>
            </td>
            <td>
                <button type="button" class="delete-btn" onclick="deleteRow(this)">
                    <i class="bi bi-x-circle"></i>
                </button>
            </td>
        </tr>
        {% endfor %}
    </tbody>

    <tfoot>
        <tr>
            <td class="text-center" colspan="2">
                <button type="button" class="add-income-btn" onclick="addRow('income')">
                    <i class="bi bi-plus-circle"></i> Add Income
                </button>
            </td>
            <td class="text-center" colspan="2">
                <button type="button" class="add-expense-btn" onclick="addRow('expense')">
                    <i class="bi bi-plus-circle"></i> Add Expense
                </button>
            </td>
        </tr>
    </tfoot>
</table>
